<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 CMK 아츠클래스 교사연수 출석체크</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="naverbot" content="noindex, nofollow">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #EAEBFC 0%, #C8CDFA 100%);
            --main-purple: #9295F7;
            --dark-blue: #23297A;
            --text-dark: #1F2253;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --success-color: #2ECC71;
            --error-color: #E74C3C;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        /* 🖥️ 한 화면에 스크롤 없이 고정 (Flex 뷰포트 레이아웃) */
        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .app-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 460px;
            height: 100%;
            max-height: 850px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(35, 41, 122, 0.15);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* 공통 시간 안내 박스 (외부 상단) */
        .global-time-notice {
            background: var(--dark-blue);
            color: var(--white);
            border-radius: 14px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-around;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .time-item span { color: #FFEAA7; margin-left: 4px; }

        /* 헤더 */
        .header { text-align: center; margin-bottom: 8px; }
        .header h1 { font-size: 19px; color: var(--dark-blue); font-weight: 800; }
        .greeting-box { font-size: 15px; font-weight: 800; color: var(--main-purple); margin-top: 2px; }

        /* 메인 콘텐츠 영역 (상태에 따라 스위칭) */
        .view-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
        }
        .view-panel.hidden { display: none !important; }

        /* QR 및 입력 메인 화면 */
        .qr-container {
            width: 100%;
            aspect-ratio: 1.3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        #reader { width: 100%; height: 100%; }
        .manual-form { display: flex; gap: 6px; }
        .input-field {
            flex: 1; padding: 11px; border: 2px solid #CCD0FF;
            border-radius: 10px; font-size: 14px; font-weight: 600; outline: none;
        }
        .input-field:focus { border-color: var(--main-purple); }
        .submit-btn {
            background: var(--dark-blue); color: var(--white); border: none;
            padding: 0 16px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* 📊 [요청 반영] 내장형 Admin 대시보드 스타일 */
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-purple); padding-bottom: 6px; }
        .admin-header h2 { font-size: 16px; color: var(--dark-blue); }
        .close-admin-btn { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        /* 요약 카드 그리드 (프로그램별 응답자 수) */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 4px 0; }
        .summary-card { background: #fff; padding: 8px 4px; border-radius: 8px; text-align: center; border: 1px solid #E2E4FF; }
        .summary-card p { font-size: 10px; font-weight: 700; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .summary-card h3 { font-size: 14px; color: var(--dark-blue); margin-top: 2px; }

        /* 명단 리스트 테이블 구역 */
        .list-container { flex: 1; overflow-y: auto; background: #fff; border-radius: 10px; border: 1px solid #E2E4FF; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        .admin-table th { background: #F4F5FF; color: var(--dark-blue); position: sticky; top: 0; padding: 8px; font-weight: 700; }
        .admin-table td { padding: 7px 8px; border-bottom: 1px solid #F0F0F0; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .status-badge.yes { background: #E8F8F5; color: #117A65; }
        .status-badge.no { background: #FADBD8; color: #78281F; }

        /* 하단 안내 배너 */
        .footer-notice-banner { background: #ffffff; border: 1.5px solid var(--main-purple); border-radius: 12px; padding: 10px; text-align: center; }
        .notice-link { color: var(--dark-blue); font-size: 12px; font-weight: 800; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 4px; }

        /* ⬇️ [요청 반영] 하단 고정 Admin 박스 */
        .admin-box-trigger {
            background: #23297A; color: #fff; border-radius: 12px; padding: 10px;
            text-align: center; margin-top: 8px; font-size: 12px; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 10px rgba(35, 41, 122, 0.2); transition: background 0.2s;
        }
        .admin-box-trigger:hover { background: #1A1F5C; }

        /* 상단 알림 팝업 */
        .status-overlay { position: absolute; top: 60px; left: 20px; right: 20px; padding: 10px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 13px; display: none; z-index: 100; }
        .success { background: #E8F8F5; color: #117A65; border: 1px solid #A3E4D7; }
        .error { background: #FADBD8; color: #78281F; border: 1px solid #F5B7B1; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div id="status-box" class="status-overlay"></div>

    <div class="global-time-notice">
        <div class="time-item">☀️ 오전 출석<span>08:30 ~ 08:45</span></div>
        <div class="time-item">🌙 오후 출석<span>13:00 ~ 13:15</span></div>
    </div>

    <div class="header">
        <h1>2026 CMK 아츠클래스</h1>
        <div id="greeting" class="greeting-box">안녕하세요!</div>
    </div>

    <div id="panel-user" class="view-panel">
        <div class="qr-container">
            <div id="reader"></div>
        </div>
        <div class="manual-form">
            <input type="text" id="teacher-name" class="input-field" placeholder="테스트할 이름을 입력하세요 (예: 김영학)">
            <button class="submit-btn" onclick="processCheckIn(document.getElementById('teacher-name').value)">확인</button>
        </div>
    </div>

    <div id="panel-admin" class="view-panel hidden">
        <div class="admin-header">
            <h2>📊 실시간 대시보드 (총 <span id="total-count">0</span>명)</h2>
            <button class="close-admin-btn" onclick="switchView('user')">닫기</button>
        </div>
        
        <div class="summary-grid">
            <div class="summary-card">
                <p>🌱 신규교사</p>
                <h3><span id="stat-new">0</span> / 33</h3>
            </div>
            <div class="summary-card">
                <p>✨ 알럼나이</p>
                <h3><span id="stat-alumni">0</span> / 14</h3>
            </div>
            <div class="summary-card">
                <p>👑 한국멘토</p>
                <h3><span id="stat-mentor">0</span> / 3</h3>
            </div>
        </div>

        <div class="list-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>프로그램</th>
                        <th>소속학교</th>
                        <th>출석여부</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="footer-notice-banner">
        <a href="https://jumpkr.github.io/2026CMKArtsclass_Check-in/" target="_blank" class="notice-link">
            ℹ️ 연수 상세 안내사항 바로가기 ↗
        </a>
    </div>

    <div class="admin-box-trigger" onclick="checkAdminPassword()">
        🔒 시스템 관리자 모드 (Admin) 바로가기
    </div>
</div>

<script>
    // 📋 출석 명단 데이터 전체 적재 (출석 명단.csv 정보 100% 매칭 기반)

        { name: "윤지연", program: "신규교사", school: "인천용정초", attended: false, time: "" },
        { name: "김경남", program: "신규교사", school: "성사초", attended: false, time: "" },
        { name: "윤지원", program: "신규교사", school: "용암초", attended: false, time: "" },
        { name: "김민지", program: "신규교사", school: "농소초", attended: false, time: "" },

        { name: "이언미", program: "신규교사", school: "단재초", attended: false, time: "" },
        { name: "김화림", program: "신규교사", school: "서울신동초", attended: false, time: "" },
        { name: "이은주", program: "신규교사", school: "신도림초", attended: false, time: "" },
        { name: "박경민", program: "신규교사", school: "신북초", attended: false, time: "" },
        { name: "정다연", program: "신규교사", school: "정수초", attended: false, time: "" },
        { name: "박민지", program: "신규교사", school: "운산초", attended: false, time: "" },
        { name: "정샛별", program: "신규교사", school: "각화초", attended: false, time: "" },
        { name: "박소리", program: "신규교사", school: "대전성룡초", attended: false, time: "" },
        { name: "조수민", program: "신규교사", school: "초롱초", attended: false, time: "" },
        { name: "박유빈", program: "신규교사", school: "자란초", attended: false, time: "" },
        { name: "조현수", program: "신규교사", school: "남양주미금초", attended: false, time: "" },
        { name: "송민영", program: "신규교사", school: "대구월서초", attended: false, time: "" },
        { name: "주혜영", program: "신규교사", school: "가현초", attended: false, time: "" },

        { name: "박슬기", program: "신규교사", school: "천안백석초", attended: false, time: "" },
        
        // 알럼나이교사 프로그램 (14명)
        { name: "박대현", program: "알럼나이", school: "진영중앙초", attended: false, time: "" },
        { name: "박병주", program: "알럼나이", school: "운곡초", attended: false, time: "" },
        { name: "박치훈", program: "알럼나이", school: "여수송현초", attended: false, time: "" },
        { name: "이한선", program: "알럼나이", school: "송죽초", attended: false, time: "" },
        { name: "김현진", program: "알럼나이", school: "능평초", attended: false, time: "" },
        { name: "박수빈", program: "알럼나이", school: "능길초", attended: false, time: "" },
        { name: "서민지", program: "알럼나이", school: "배곧해솔초", attended: false, time: "" },
        { name: "송하영", program: "알럼나이", school: "안성초", attended: false, time: "" },
        { name: "윤희수", program: "알럼나이", school: "장락초", attended: false, time: "" },

        { name: "이보라", program: "알럼나이", school: "대전새여울초", attended: false, time: "" },
        { name: "조은아", program: "알럼나이", school: "가현초", attended: false, time: "" },

        { name: "조세옥", program: "알럼나이", school: "죽백초", attended: false, time: "" },
        
        // 한국멘토연수 2기 (3명)
        { name: "이바로", program: "한국멘토", school: "운산초", attended: false, time: "" },
        { name: "배가영", program: "한국멘토", school: "보평초", attended: false, time: "" },
        { name: "천아롱", program: "한국멘토", school: "안산중앙초", attended: false, time: "" }
    ];

    // ⏰ 1. 아침/오후 분기형 다이내믹 인사말 설정
    function setDynamicGreeting() {
        const hour = new Date().getHours();
        const greetingEl = document.getElementById("greeting");
        if (hour < 12) {
            greetingEl.innerText = "☀️ 굿모닝! 즐거운 아침입니다.";
        } else {
            greetingEl.innerText = "🌙 굿 애프터눈! 반갑습니다.";
        }
    }
    setDynamicGreeting();

    // 📸 2. 오픈소스 QR 스캐너 연동 구동
    function onScanSuccess(decodedText) {
        processCheckIn(decodedText);
    }
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
    html5QrcodeScanner.render(onScanSuccess);

    // 🚀 3. 핵심: 출석 체크 처리 및 로컬 데이터 동기화
    function processCheckIn(inputData) {
        if (!inputData.trim()) return;
        const targetName = inputData.trim();
        const statusBox = document.getElementById("status-box");
        
        // 명단에서 해당 교사 탐색
        const matchedUser = roster.find(user => user.name === targetName);

        statusBox.style.display = "block";

        if (matchedUser) {
            // 출석 처리 상태 변경
            matchedUser.attended = true;
            matchedUser.time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            statusBox.className = "status-overlay success";
            statusBox.innerHTML = `✅ 출석 성공!<br>${matchedUser.name} 교사 [${matchedUser.program}]`;
            
            // 입력창 초기화 및 대시보드 리프레시
            document.getElementById('teacher-name').value = "";
            renderAdminDashboard();
        } else {
            // 명단에 없을 때의 피드백
            statusBox.className = "status-overlay error";
            statusBox.innerHTML = `❌ 출석 실패: 명단에 없는 이름입니다.`;
        }

        setTimeout(() => { statusBox.style.display = "none"; }, 3500);
    }

    // 🔒 4. [요청 반영] 하단 박스 전용 패스워드 인증(0729) 및 뷰 전환
    function checkAdminPassword() {
        const password = prompt("관리자 비밀번호를 입력해 주세요:");
        if (password === "0729") {
            switchView('admin');
        } else if (password !== null) {
            alert("⚠️ 비밀번호가 일치하지 않습니다.");
        }
    }

    function switchView(view) {
        if (view === 'admin') {
            document.getElementById('panel-user').classList.add('hidden');
            document.getElementById('panel-admin').classList.remove('hidden');
            renderAdminDashboard();
        } else {
            document.getElementById('panel-admin').classList.add('hidden');
            document.getElementById('panel-user').classList.remove('hidden');
        }
    }

    // 📊 5. [요청 반영] 요약 통계 및 실시간 테이블 렌더링 함수
    function renderAdminDashboard() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = "";

        // 실시간 프로그램별 인원 카운트 산출
        let countNew = 0, countAlumni = 0, countMentor = 0;
        let totalAttended = 0;

        roster.forEach(user => {
            if (user.attended) {
                totalAttended++;
                if (user.program === "신규교사") countNew++;
                if (user.program === "알럼나이") countAlumni++;
                if (user.program === "한국멘토") countMentor++;
            }

            // 행 데이터 주입
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${user.name}</strong></td>
                <td>${user.program}</td>
                <td>${user.school}</td>
                <td><span class="status-badge ${user.attended ? 'yes' : 'no'}">${user.attended ? '출석 ('+user.time+')' : '미출석'}</span></td>
            `;
            tbody.appendChild(tr);
        });

        // 상단 요약 바인딩
        document.getElementById('total-count').innerText = totalAttended;
        document.getElementById('stat-new').innerText = countNew;
        document.getElementById('stat-alumni').innerText = countAlumni;
        document.getElementById('stat-mentor').innerText = countMentor;
    }
</script>

</body>
</html>
